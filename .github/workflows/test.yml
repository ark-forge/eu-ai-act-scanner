name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run scanner on self
        run: eu-ai-act-scanner scan .

      - name: Test CLI help
        run: eu-ai-act-scanner --help

      - name: Test suggest command
        run: eu-ai-act-scanner suggest --use-case "chatbot for customer support"

      - name: Test check command
        run: eu-ai-act-scanner check . --risk minimal

      - name: Test JSON output
        run: eu-ai-act-scanner scan . --json
